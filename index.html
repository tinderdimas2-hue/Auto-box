<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Box - Versão Simplificada</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #0B0D10; color: #EFF1F3; }
        .card { background: #1B1F26; border-radius: 16px; padding: 15px; margin-bottom: 10px; border-left: 4px solid #F5A623; }
        .container { max-width: 800px; margin: auto; }
        .error { color: #ff8888; background: #330000; padding: 10px; border-radius: 8px; }
        button { background: #F5A623; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; border-radius: 12px; border: 1px solid #2A2F38; background: #14171C; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h1>🚗 Auto Box - João Pessoa</h1>
    <div id="status">Carregando...</div>
    <div id="lista"></div>

    <hr>
    <h3>Solicitar cotação</h3>
    <input type="text" id="nome" placeholder="Seu nome">
    <input type="text" id="whats" placeholder="WhatsApp">
    <input type="text" id="carro" placeholder="Modelo do carro">
    <textarea id="descricao" rows="2" placeholder="O que precisa?"></textarea>
    <button id="enviarCotacao">Enviar cotação</button>

    <hr>
    <h3>Cotações abertas</h3>
    <div id="cotaçõesLista"></div>
</div>

<script>
    const SUPABASE_URL = 'https://llmbrimuawiyenxwrptr.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_uMKq-Y7uueGkd0gYt0kJ2Q_w4GT6-qL';

    async function fetchAPI(path, options = {}) {
        const url = `${SUPABASE_URL}/rest/v1/${path}`;
        const headers = {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
        };
        const response = await fetch(url, { ...options, headers });
        if (!response.ok) {
            const text = await response.text();
            throw new Error(`HTTP ${response.status}: ${text}`);
        }
        return response.json();
    }

    async function carregarEstabelecimentos() {
        try {
            const data = await fetchAPI('establishments?select=name,type,specialties,whatsapp');
            const listaDiv = document.getElementById('lista');
            if (data.length === 0) {
                listaDiv.innerHTML = '<div class="card">Nenhum estabelecimento cadastrado.</div>';
            } else {
                listaDiv.innerHTML = data.map(est => `
                    <div class="card">
                        <strong>${est.name}</strong> <span style="color:#F5A623;">(${est.type})</span><br>
                        ${est.specialties || ''}<br>
                        <button onclick="window.open('https://wa.me/${est.whatsapp}?text=Olá!', '_blank')">WhatsApp</button>
                    </div>
                `).join('');
            }
            document.getElementById('status').innerHTML = `✅ ${data.length} estabelecimentos carregados.`;
        } catch (err) {
            document.getElementById('status').innerHTML = `<div class="error">❌ Erro: ${err.message}</div>`;
        }
    }

    async function carregarCotações() {
        try {
            const data = await fetchAPI('quotations?select=*&order=created_at.desc');
            const div = document.getElementById('cotaçõesLista');
            if (data.length === 0) {
                div.innerHTML = '<div class="card">Nenhuma cotação ainda.</div>';
                return;
            }
            div.innerHTML = data.map(q => `
                <div class="card">
                    <strong>${q.user_name}</strong> - ${q.car_model}<br>
                    ${q.description}<br>
                    <small>📞 ${q.phone}</small>
                </div>
            `).join('');
        } catch (err) {
            console.error(err);
        }
    }

    document.getElementById('enviarCotacao').onclick = async () => {
        const nome = document.getElementById('nome').value;
        const whats = document.getElementById('whats').value;
        const carro = document.getElementById('carro').value;
        const desc = document.getElementById('descricao').value;
        if (!nome || !whats || !carro || !desc) {
            alert('Preencha todos os campos');
            return;
        }
        try {
            await fetchAPI('quotations', {
                method: 'POST',
                body: JSON.stringify({
                    user_name: nome,
                    phone: whats,
                    car_model: carro,
                    description: desc
                })
            });
            alert('Cotação enviada!');
            document.getElementById('nome').value = '';
            document.getElementById('whats').value = '';
            document.getElementById('carro').value = '';
            document.getElementById('descricao').value = '';
            carregarCotações();
        } catch (err) {
            alert('Erro ao enviar: ' + err.message);
        }
    };

    carregarEstabelecimentos();
    carregarCotações();
</script>
</body>
</html>

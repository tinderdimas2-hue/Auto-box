<!DOCTYPE html>
<html>
<head>
    <title>Teste Supabase Direto</title>
    <meta charset="UTF-8">
</head>
<body>
    <h2>Teste de Conexão Direta com Supabase</h2>
    <pre id="resultado" style="background:#eee; padding:10px;">Aguardando...</pre>

    <script>
        const url = 'https://llmbrimuawiyenxwrptr.supabase.co/rest/v1/establishments?select=name';
        const headers = {
            'apikey': 'sb_publishable_uMKq-Y7uueGkd0gYt0kJ2Q_w4GT6-qL',
            'Authorization': 'Bearer sb_publishable_uMKq-Y7uueGkd0gYt0kJ2Q_w4GT6-qL'
        };

        const saida = document.getElementById('resultado');
        saida.innerText = 'Enviando requisição...';

        fetch(url, { headers })
            .then(response => {
                saida.innerText = `Status HTTP: ${response.status} ${response.statusText}\n`;
                if (!response.ok) {
                    return response.text().then(text => {
                        throw new Error(`HTTP ${response.status}: ${text}`);
                    });
                }
                return response.json();
            })
            .then(data => {
                saida.innerText += `✅ Sucesso! Dados recebidos:\n${JSON.stringify(data, null, 2)}`;
            })
            .catch(err => {
                saida.innerText += `❌ Erro capturado:\n${err.message}\n\nDetalhes: ${err.stack || 'sem stack'}`;
            });
    </script>
</body>
</html>
